<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta property="og:title" content="하젤 타이머🩶">
<meta property="og:description" content="아무것도 하지 않으면 아무것도 달라지지 않는다">
<meta property="og:image" content="https://i.imgur.com/Tf14Fr0.jpg">
<meta property="og:url" content="https://hazelee2626-lang.github.io/hazel-timer">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>HAZEL TIMER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=Noto+Sans+KR:wght@300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
min-height: 100vh;
background: transparent !important;
display: flex;
align-items: center;
justify-content: center;
font-family: ‘DM Mono’, monospace;
}

.wrap {
width: 320px;
background: #111000;
border: 1px solid rgba(212,168,67,0.5);
border-radius: 6px;
padding: 20px 20px 24px;
position: relative;
box-shadow: 0 0 0 1px rgba(0,0,0,0.8), 0 30px 80px rgba(0,0,0,0.8);
}

.wrap::before {
content: ‘’;
position: absolute;
top: 0; left: 8%; right: 8%; height: 1px;
background: linear-gradient(90deg, transparent, #e8c96a, transparent);
opacity: 0.9;
}

.wrap::after {
content: ‘’;
position: absolute;
top: 8px; left: 8px;
width: 18px; height: 18px;
border-top: 1px solid rgba(212,168,67,0.5);
border-left: 1px solid rgba(212,168,67,0.5);
}

.corner-br {
position: absolute;
bottom: 8px; right: 8px;
width: 18px; height: 18px;
border-bottom: 1px solid rgba(212,168,67,0.5);
border-right: 1px solid rgba(212,168,67,0.5);
}

/* HEADER */
.header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 12px;
gap: 10px;
}

.quote {
font-family: ‘Noto Sans KR’, sans-serif;
font-size: 9px;
font-weight: 300;
color: rgba(255,248,231,0.5);
line-height: 1.6;
letter-spacing: 0.03em;
flex: 1;
}

.btn-main {
background: none;
border: none;
color: rgba(255,248,231,0.5);
font-family: ‘DM Mono’, monospace;
font-size: 8px;
letter-spacing: 0.25em;
text-transform: uppercase;
cursor: pointer;
padding: 2px 0;
border-bottom: 1px solid transparent;
transition: all 0.2s;
display: block;
}
.btn-main:hover { color: #e8c96a; border-bottom-color: #e8c96a; }
.btn-main.running { color: #c95c4c; border-bottom-color: #c95c4c; }

.btn-reset {
background: none;
border: none;
color: rgba(255,248,231,0.22);
font-family: ‘DM Mono’, monospace;
font-size: 7px;
letter-spacing: 0.18em;
text-transform: uppercase;
cursor: pointer;
margin-top: 4px;
transition: color 0.2s;
display: block;
}
.btn-reset:hover { color: rgba(255,248,231,0.5); }

/* DIVIDER */
.hdivider {
height: 1px;
background: linear-gradient(90deg, transparent, rgba(212,168,67,0.4), transparent);
margin-bottom: 14px;
}

/* TABS */
.tabs {
display: flex;
justify-content: center;
gap: 20px;
margin-bottom: 16px;
}
.tab {
background: none;
border: none;
font-family: ‘DM Mono’, monospace;
font-size: 9px;
letter-spacing: 0.18em;
text-transform: uppercase;
color: rgba(255,248,231,0.3);
cursor: pointer;
padding-bottom: 3px;
border-bottom: 1px solid transparent;
transition: all 0.2s;
}
.tab.active { color: #c9a84c; border-bottom-color: #c9a84c; }

/* SECTION */
.section { display: none; }
.section.visible { display: block; }

/* SETTER */
.setter { padding: 10px 0 4px; }

.setter-row {
display: flex;
align-items: center;
justify-content: center;
gap: 2px;
}

.s-group {
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
}

.s-arrow {
background: transparent;
border: 1px solid rgba(212,168,67,0.4);
border-radius: 3px;
color: rgba(255,248,231,0.4);
width: 62px; height: 18px;
font-size: 9px;
cursor: pointer;
transition: all 0.15s;
}
.s-arrow:hover {
color: #e8c96a;
border-color: #c9a84c;
background: rgba(212,168,67,0.12);
}

.s-sep {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 28px;
color: rgba(212,168,67,0.4);
padding: 0 1px;
margin-top: -6px;
}

.s-labels {
display: flex;
justify-content: center;
margin-top: 4px;
margin-bottom: 16px;
}

.s-lbl {
font-size: 8px;
letter-spacing: 0.15em;
text-transform: uppercase;
color: rgba(255,248,231,0.22);
min-width: 56px;
text-align: center;
}

/* UNTIL - TIME PICKER */
.until-wrap {
padding: 8px 0 4px;
text-align: center;
}

.until-row {
display: flex;
align-items: center;
justify-content: center;
gap: 4px;
margin-bottom: 8px;
}

.time-input {
background: #111000;
border: 1px solid rgba(212,168,67,0.4);
border-radius: 4px;
color: #e8c96a;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 34px;
text-align: center;
width: 62px;
padding: 4px 0;
outline: none;
text-shadow: 0 0 20px rgba(212,168,67,0.4);
-webkit-appearance: none;
}
.time-input:focus {
border-color: #c9a84c;
box-shadow: 0 0 10px rgba(212,168,67,0.15);
}

.time-sep-big {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 28px;
color: rgba(212,168,67,0.4);
margin-top: -4px;
}

.ampm-wrap {
display: flex;
flex-direction: column;
gap: 3px;
}

.ampm-btn {
background: transparent;
border: 1px solid rgba(212,168,67,0.3);
border-radius: 3px;
color: rgba(255,248,231,0.3);
font-family: ‘DM Mono’, monospace;
font-size: 8px;
letter-spacing: 0.1em;
cursor: pointer;
padding: 3px 7px;
transition: all 0.2s;
}
.ampm-btn.active {
background: rgba(212,168,67,0.15);
color: #e8c96a;
border-color: #c9a84c;
}

.until-status {
font-size: 9px;
letter-spacing: 0.15em;
color: rgba(255,248,231,0.3);
margin-bottom: 16px;
min-height: 14px;
}

/* DISPLAY ROW */
.display-row {
display: flex;
align-items: center;
justify-content: center;
gap: 7px;
padding: 14px 12px 12px;
background: #0d0b00;
border: 1px solid rgba(212,168,67,0.2);
border-radius: 6px;
margin-bottom: 6px;
position: relative;
overflow: hidden;
}

.digit-group { display: flex; gap: 3px; }

.digit-block {
width: 42px; height: 56px;
position: relative;
border-radius: 4px;
overflow: hidden;
background: #1c1800;
box-shadow: 0 4px 16px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,168,67,0.2);
}

.digit-block .top {
position: absolute;
top: 0; left: 0; right: 0; height: 50%;
background: #222000;
border-radius: 4px 4px 0 0;
}

.digit-block .bot {
position: absolute;
bottom: 0; left: 0; right: 0; height: 50%;
background: #161200;
border-radius: 0 0 4px 4px;
}

.digit-block::after {
content: ‘’;
position: absolute;
top: 50%; left: 0; right: 0;
height: 1px;
background: rgba(0,0,0,0.8);
z-index: 10;
}

.digit-val {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 34px;
font-weight: 400;
color: #e8c96a;
line-height: 1;
text-shadow: 0 0 20px rgba(212,168,67,0.6);
position: absolute;
top: 50%; left: 50%;
transform: translate(-50%, -50%);
z-index: 5;
transition: color 0.3s;
white-space: nowrap;
}

.digit-val.danger {
color: #c95c4c !important;
animation: danger-pulse 1s ease-in-out infinite;
}

/* paused state */
.display-row.paused .digit-val {
color: rgba(201,168,76,0.25) !important;
text-shadow: none !important;
}
.display-row.paused .colon-dot {
opacity: 0.15;
}
.pause-overlay {
display: none;
position: absolute;
inset: 0;
align-items: center;
justify-content: center;
pointer-events: none;
}
.display-row.paused .pause-overlay {
display: flex;
}
.pause-text {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
font-weight: 400;
letter-spacing: 0.15em;
color: rgba(255,255,255,0.55);
}

.colon {
display: flex;
flex-direction: column;
gap: 10px;
padding-bottom: 2px;
}

.colon-dot {
width: 4px; height: 4px;
border-radius: 50%;
background: #c9a84c;
box-shadow: 0 0 6px rgba(212,168,67,0.7);
transition: opacity 0.5s;
}

.colon.dim .colon-dot { opacity: 0.15; }

.display-footer {
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 2px;
margin-bottom: 0;
}

.d-label {
font-size: 8px;
letter-spacing: 0.22em;
text-transform: uppercase;
color: #c9a84c;
opacity: 0.6;
}

.d-right {
font-size: 8px;
letter-spacing: 0.1em;
color: rgba(255,248,231,0.3);
}

@keyframes ambient {
0%,100% { box-shadow: 0 0 0 1px rgba(0,0,0,0.8), 0 30px 80px rgba(0,0,0,0.8); }
50% { box-shadow: 0 0 0 1px rgba(0,0,0,0.8), 0 30px 80px rgba(0,0,0,0.8), 0 0 60px rgba(212,168,67,0.08); }
}
.wrap.running { animation: ambient 3s ease-in-out infinite; }

@keyframes danger-pulse {
0%,100% { text-shadow: 0 0 16px rgba(201,92,76,0.3); }
50% { text-shadow: 0 0 32px rgba(201,92,76,0.8); }
}

/* ── HOURGLASS ── */
.hg-toggle {
background: none;
border: 1px solid rgba(201,168,76,0.3);
border-radius: 3px;
color: rgba(201,168,76,0.4);
font-size: 13px;
width: 22px; height: 18px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all 0.2s;
padding: 0;
line-height: 1;
}
.hg-toggle:hover, .hg-toggle.active {
color: #c9a84c;
border-color: #c9a84c;
background: rgba(201,168,76,0.08);
}

.hg-wrap {
display: flex;
align-items: center;
justify-content: center;
background: #080700;
border: 1px solid rgba(212,168,67,0.15);
border-radius: 6px;
margin-bottom: 6px;
padding: 14px 0;
min-height: 96px;
}

.hg-canvas-wrap {
position: relative;
width: 96px;
height: 96px;
flex-shrink: 0;
}

.hg-canvas-wrap canvas {
position: absolute;
top: 0; left: 0;
}

position: fixed;
bottom: 20px; left: 50%;
transform: translateX(-50%);
background: #111000;
border: 1px solid rgba(212,168,67,0.5);
border-radius: 3px;
padding: 8px 18px;
font-size: 10px;
letter-spacing: 0.2em;
color: #c9a84c;
opacity: 0;
transition: opacity 0.3s;
pointer-events: none;
white-space: nowrap;
z-index: 999;
}
.toast.show { opacity: 1; }
</style>

</head>

<script>
function f2(n){ return String(Math.floor(Math.abs(n))).padStart(2,'0'); }

function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

function startBlink(id1, id2){
  return setInterval(function(){
    document.getElementById(id1).classList.toggle('dim');
    document.getElementById(id2).classList.toggle('dim');
  }, 500);
}
function stopBlink(iv, id1, id2){
  clearInterval(iv);
  document.getElementById(id1).classList.remove('dim');
  document.getElementById(id2).classList.remove('dim');
}

// ── TAB SWITCH ──────────────────────────────
var currentTab = 'until';

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('active', (i===0&&tab==='until')||(i===1&&tab==='timer'));
  });
  document.getElementById('timer-section').classList.toggle('visible', tab==='timer');
  document.getElementById('until-section').classList.toggle('visible', tab==='until');
  updateHeaderBtn();
}

function toggleActive(){
  if(currentTab==='timer') toggleTimer();
  else toggleUntil();
}

function resetActive(){
  if(currentTab==='timer') resetTimer();
  else resetUntil();
}

function updateHeaderBtn(){
  var btn = document.getElementById('active-btn');
  var running = currentTab==='timer' ? tRun : uRun;
  var hasLeft = currentTab==='timer' ? tLeft>0 : uLeft>0;
  var label = running ? 'Pause' : (hasLeft ? 'Resume' : 'Start');
  btn.textContent = label;
  btn.classList.toggle('running', running);
}

// ── TIMER ────────────────────────────────────
var tLeft=0, tTotal=0, tRun=false, tInt=null, tBlink=null;

function adjInput(id, d, min, max, wrap) {
  var el = document.getElementById(id);
  var v = (parseInt(el.value) || 0) + d;
  if (wrap) {
    if (v > max) v = min;
    if (v < min) v = max;
  } else {
    v = Math.max(min, Math.min(max, v));
  }
  el.value = v;
}

// long press — hold to repeat with acceleration
var _lpTimer = null, _lpInterval = null;

function startHold(id, d, min, max, wrap) {
  adjInput(id, d, min, max, wrap);
  var speed = 120;
  _lpTimer = setTimeout(function() {
    function tick() {
      adjInput(id, d, min, max, wrap);
      if (speed > 40) speed -= 10;
      _lpInterval = setTimeout(tick, speed);
    }
    tick();
  }, 400);
}

function stopHold() {
  clearTimeout(_lpTimer);
  clearTimeout(_lpInterval);
  _lpTimer = null; _lpInterval = null;
}function toggleTimer(){ tRun ? pauseTimer() : startTimer(); }

function startTimer(){
  if(!tLeft){
    var h = parseInt(document.getElementById('s-h').value)||0;
    var m = parseInt(document.getElementById('s-m').value)||0;
    var s = parseInt(document.getElementById('s-s').value)||0;
    tTotal = h*3600 + m*60 + s;
    if(!tTotal) return;
    tLeft = tTotal;
    document.getElementById('t-setter').style.display = 'none';
    document.getElementById('t-run').style.display = 'block';
    renderTimer();
  }
  tRun = true;
  document.getElementById('wrap').classList.add('running');
  var dr = document.getElementById('t-display-row');
  if(dr) dr.classList.remove('paused');
  tBlink = startBlink('t-colon1','t-colon2');
  tInt = setInterval(function(){
    if(tLeft <= 0){ doneTimer(); return; }
    tLeft--; renderTimer();
  }, 1000);
  updateHeaderBtn();
}

function pauseTimer(){
  tRun = false; clearInterval(tInt); stopBlink(tBlink,'t-colon1','t-colon2');
  document.getElementById('wrap').classList.remove('running');
  var dr = document.getElementById('t-display-row');
  if(dr) dr.classList.add('paused');
  if(hgMode) { var pct = tTotal>0 ? tLeft/tTotal : 0; drawPieSand(pct); }
  updateHeaderBtn();
}

function doneTimer(){
  pauseTimer(); tLeft = 0; renderTimer();
  toast('⏰  Time\'s up');
  setTimeout(resetTimer, 2600);
}

function resetTimer(){
  tRun = false; clearInterval(tInt);
  if(tBlink) stopBlink(tBlink,'t-colon1','t-colon2');
  tLeft = 0;
  // reset pie mode
  if(hgMode){
    hgMode = false;
    cancelAnimationFrame(hgAnimFrame);
    var hgView = document.getElementById('t-hg-view');
    var digitView = document.getElementById('t-digit-view');
    if(hgView){ hgView.style.display='none'; hgView.style.opacity='0'; }
    if(digitView){ digitView.style.display='block'; digitView.style.opacity='1'; }
    var btn = document.getElementById('hg-btn');
    if(btn) btn.classList.remove('active');
  }
  // always restore digit view opacity
  var digitView = document.getElementById('t-digit-view');
  if(digitView){ digitView.style.display='block'; digitView.style.opacity='1'; }
  document.getElementById('t-setter').style.display = 'block';
  document.getElementById('t-run').style.display = 'none';
  document.getElementById('wrap').classList.remove('running');
  updateHeaderBtn();
}

function renderTimer(){
  var h=Math.floor(tLeft/3600), m=Math.floor((tLeft%3600)/60), s=tLeft%60;
  var hh=f2(h), mm=f2(m), ss=f2(s);
  document.getElementById('td0').textContent=hh[0];
  document.getElementById('td1').textContent=hh[1];
  document.getElementById('td2').textContent=mm[0];
  document.getElementById('td3').textContent=mm[1];
  document.getElementById('td4').textContent=ss[0];
  document.getElementById('td5').textContent=ss[1];
  var danger = tLeft<=10 && tLeft>0;
  ['td0','td1','td2','td3','td4','td5'].forEach(function(id){
    document.getElementById(id).classList.toggle('danger', danger);
  });
  var pct = tTotal ? Math.round((tLeft/tTotal)*100) : 0;
  document.getElementById('t-pct').textContent = pct+'%';
  var showH = tLeft>=3600;
  document.getElementById('hr-group').style.display = showH?'flex':'none';
  document.getElementById('t-colon1').style.display = showH?'flex':'none';
}

// ── UNTIL ────────────────────────────────────
var ampm = 'PM';
var uRun = false, uInt = null, uBlink = null, uLeft = 0, uTotal = 0, uTarget = null;

function setAmPm(v){
  ampm = v;
  document.getElementById('am-btn').classList.toggle('active', v==='AM');
  document.getElementById('pm-btn').classList.toggle('active', v==='PM');
}

function clampInput(el, min, max){
  var v = parseInt(el.value)||0;
  if(v < min) el.value = min;
  if(v > max) el.value = max;
}

function getTargetTime(){
  var h = parseInt(document.getElementById('u-h').value)||12;
  var m = parseInt(document.getElementById('u-m').value)||0;
  if(ampm==='PM' && h!==12) h += 12;
  if(ampm==='AM' && h===12) h = 0;
  var now = new Date();
  var target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);
  if(target <= now) target.setDate(target.getDate()+1);
  return target;
}

function toggleUntil(){ uRun ? pauseUntil() : startUntil(); }

function startUntil(){
  if(!uTarget || !uLeft){
    uTarget = getTargetTime();
    var now = new Date();
    uTotal = Math.floor((uTarget - now)/1000);
    uLeft = uTotal;
    if(uLeft <= 0) return;
    // show label
    var h = uTarget.getHours();
    var m = uTarget.getMinutes();
    var ap = h>=12?'PM':'AM';
    var dh = h%12||12;
    document.getElementById('u-footer-label').textContent = dh+':'+(m<10?'0':'')+m+' '+ap;
    document.getElementById('u-status').textContent = '';
    document.getElementById('until-section').querySelector('.until-wrap').style.display='none';
    document.getElementById('u-run').style.display='block';
    renderUntil();
  }
  uRun = true;
  document.getElementById('wrap').classList.add('running');
  var udr = document.getElementById('u-display-row');
  if(udr) udr.classList.remove('paused');
  uBlink = startBlink('u-colon1','u-colon2');
  uInt = setInterval(function(){
    var now = new Date();
    uLeft = Math.floor((uTarget - now)/1000);
    if(uLeft <= 0){ doneUntil(); return; }
    renderUntil();
  }, 1000);
  updateHeaderBtn();
}

function pauseUntil(){
  uRun = false; clearInterval(uInt); stopBlink(uBlink,'u-colon1','u-colon2');
  document.getElementById('wrap').classList.remove('running');
  var dr = document.getElementById('u-display-row');
  if(dr) dr.classList.add('paused');
  if(uHgMode) { var pct = uTotal>0 ? uLeft/uTotal : 0; drawUntilPieSand(pct); }
  updateHeaderBtn();
}

function doneUntil(){
  pauseUntil(); uLeft=0; renderUntil();
  toast('⏰  Time\'s up!');
  setTimeout(resetUntil, 2600);
}

function resetUntil(){
  uRun=false; clearInterval(uInt);
  if(uBlink) stopBlink(uBlink,'u-colon1','u-colon2');
  uLeft=0; uTarget=null;
  if(uHgMode){
    uHgMode=false; cancelAnimationFrame(uHgAnimFrame);
    var hv=document.getElementById('u-hg-view'); if(hv){hv.style.display='none';hv.style.opacity='0';}
    var dv=document.getElementById('u-digit-view'); if(dv){dv.style.display='block';dv.style.opacity='1';}
    var ub=document.getElementById('u-hg-btn'); if(ub) ub.classList.remove('active');
  }
  document.getElementById('until-section').querySelector('.until-wrap').style.display='block';
  document.getElementById('u-run').style.display='none';
  document.getElementById('u-status').textContent='—';
  document.getElementById('wrap').classList.remove('running');
  updateHeaderBtn();
}

function renderUntil(){
  var h=Math.floor(uLeft/3600), m=Math.floor((uLeft%3600)/60), s=uLeft%60;
  var hh=f2(h), mm=f2(m), ss=f2(s);
  document.getElementById('ud0').textContent=hh[0];
  document.getElementById('ud1').textContent=hh[1];
  document.getElementById('ud2').textContent=mm[0];
  document.getElementById('ud3').textContent=mm[1];
  document.getElementById('ud4').textContent=ss[0];
  document.getElementById('ud5').textContent=ss[1];
  var danger = uLeft<=60 && uLeft>0;
  ['ud0','ud1','ud2','ud3','ud4','ud5'].forEach(function(id){
    document.getElementById(id).classList.toggle('danger', danger);
  });
  var pct = uTotal ? Math.round((uLeft/uTotal)*100) : 0;
  document.getElementById('u-pct').textContent = pct+'%';
}

updateHeaderBtn();

// ── PIE DRAW ──────────────────────────────────────────
function drawPieFrame() {
  var c = document.getElementById('hg-bg');
  if (!c) return;
  var dpr = window.devicePixelRatio || 2;
  var size = 96;
  c.width = size * dpr; c.height = size * dpr;
  c.style.width = size + 'px'; c.style.height = size + 'px';
  var ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);
  var cx = 48, cy = 48, R = 38;
  // track ring
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(201,168,76,0.15)';
  ctx.lineWidth = 7;
  ctx.stroke();
  // clock marks
  for (var i = 0; i < 12; i++) {
    var a = (i / 12) * Math.PI * 2 - Math.PI/2;
    var r1 = R + 6, r2 = R + 9;
    ctx.beginPath();
    ctx.moveTo(cx + r1*Math.cos(a), cy + r1*Math.sin(a));
    ctx.lineTo(cx + r2*Math.cos(a), cy + r2*Math.sin(a));
    ctx.strokeStyle = 'rgba(201,168,76,' + (i%3===0?'0.5':'0.2') + ')';
    ctx.lineWidth = i%3===0 ? 1.5 : 0.8;
    ctx.stroke();
  }
}

function drawPieSand(pct) {
  var c = document.getElementById('hg-sand');
  if (!c) return;
  var dpr = window.devicePixelRatio || 2;
  var size = 96;
  c.width = size * dpr; c.height = size * dpr;
  c.style.width = size + 'px'; c.style.height = size + 'px';
  var ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);
  var cx = 48, cy = 48, R = 38;
  var remain = Math.max(0, Math.min(1, pct));
  var startA = -Math.PI/2;
  var endA = startA + Math.PI*2 * remain;

  if (remain > 0.001) {
    // pie fill
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R - 4, startA, endA);
    ctx.closePath();
    var grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
    grd.addColorStop(0,   'rgba(255,235,100,0.2)');
    grd.addColorStop(0.6, 'rgba(210,170,55,0.15)');
    grd.addColorStop(1,   'rgba(180,135,30,0.08)');
    ctx.fillStyle = grd;
    ctx.fill();

    // arc stroke
    ctx.beginPath();
    ctx.arc(cx, cy, R, startA, endA);
    ctx.strokeStyle = remain > 0.15
      ? 'rgba(220,180,60,0.95)'
      : 'rgba(201,80,60,0.95)';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.stroke();

    // glow
    ctx.beginPath();
    ctx.arc(cx, cy, R, startA, endA);
    ctx.strokeStyle = remain > 0.15
      ? 'rgba(255,215,60,0.18)'
      : 'rgba(201,80,60,0.18)';
    ctx.lineWidth = 14;
    ctx.stroke();

    // leading dot
    var dotX = cx + R * Math.cos(endA);
    var dotY = cy + R * Math.sin(endA);
    ctx.beginPath();
    ctx.arc(dotX, dotY, 5, 0, Math.PI*2);
    ctx.fillStyle = remain > 0.15 ? 'rgba(255,235,100,1)' : 'rgba(255,100,80,1)';
    ctx.fill();
    // dot glow
    ctx.beginPath();
    ctx.arc(dotX, dotY, 9, 0, Math.PI*2);
    ctx.fillStyle = remain > 0.15 ? 'rgba(255,215,60,0.25)' : 'rgba(255,80,60,0.25)';
    ctx.fill();
  }

  // center content
  var isPaused = !tRun && tLeft > 0;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  if (isPaused) {
    ctx.font = '400 20px "Bebas Neue", sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText('PAUSE', cx, cy);
  } else {
    var h=Math.floor(tLeft/3600), m=Math.floor((tLeft%3600)/60), s=tLeft%60;
    var timeStr = tLeft>=3600 ? f2(h)+':'+f2(m)+':'+f2(s) : f2(m)+':'+f2(s);
    ctx.font = '700 12px "DM Mono", monospace';
    ctx.fillStyle = remain > 0.15 ? 'rgba(201,168,76,0.9)' : 'rgba(220,80,60,0.9)';
    ctx.fillText(timeStr, cx, cy);
  }
}


var hgMode = false;
var hgAnimFrame = null;

function hgLoop() {
  if (!hgMode) return;
  var pct = tTotal > 0 ? tLeft / tTotal : 0;
  drawPieSand(pct);
  hgAnimFrame = requestAnimationFrame(hgLoop);
}

function toggleHourglass() {
  hgMode = !hgMode;
  var btn = document.getElementById('hg-btn');
  var digitView = document.getElementById('t-digit-view');
  var hgView = document.getElementById('t-hg-view');

  if (hgMode) {
    digitView.style.opacity = '0';
    setTimeout(function() {
      digitView.style.display = 'none';
      hgView.style.display = 'block';
      drawPieFrame();
      setTimeout(function() {
        hgView.style.opacity = '1';
        hgLoop();
      }, 20);
    }, 500);
    btn.classList.add('active');
  } else {
    cancelAnimationFrame(hgAnimFrame);
    hgView.style.opacity = '0';
    setTimeout(function() {
      hgView.style.display = 'none';
      digitView.style.display = 'block';
      setTimeout(function() { digitView.style.opacity = '1'; }, 20);
    }, 500);
    btn.classList.remove('active');
  }
}
